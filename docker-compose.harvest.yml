# Harvest-only fleet — lightweight bots that collect training data.
#
# Each bot joins a public game, watches + records the drawings it sees, and on its
# own turn: draws a QuickDraw word if it can, otherwise LEAVES and rejoins a fresh
# game (no AFK, no bad scribbles). They don't load vision or the ONNX models, so
# they're cheap — run a bunch:
#
#   docker compose -f docker-compose.harvest.yml up --build --scale harvester=4
#
# Each container writes its own shard at ./data/harvest/samples.<container>.ndjson
# (safe concurrent writes); the trainer reads every shard automatically.
services:
  harvester:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      # Defaults = lightweight, silent harvesting. Override via env without editing
      # this file, e.g.  BOT_GUESS=1 BOT_VISION=1 docker compose -f … up
      - BOT_GUESS=${BOT_GUESS:-0}        # 1 = also guess in chat (needs vision)
      - BOT_VISION=${BOT_VISION:-0}      # 1 = load doodleNet (heavier; needed to guess well)
      - BOT_MODELS=${BOT_MODELS:-0}      # 1 = load the trained ONNX detector
      - BOT_LEARN=1              # harvest on
      - BOT_SHARD=1              # per-container harvest file
      - BOT_NAME_RANDOM=1        # believable human-ish name per bot
      - BOT_LEAVE_UNDRAWABLE=1   # leave + rejoin when it can't draw its word
      - BOT_START_DELAY=20       # stagger first join (random 0-20s) so the fleet doesn't thunder-herd matchmaking
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Always-on dashboard (one container): live stats + the harvested drawings.
  # Open http://localhost:28080 (set DASHBOARD_PORT to change).
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.bot
    command: ["bun", "run", "src/dashboard.js"]
    environment:
      - PORT=8080
    ports:
      - "${DASHBOARD_PORT:-28080}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
